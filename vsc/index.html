<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Parejas de Emoji</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>

  <!--En <body> creamos estructura con un contenedor <div> con clase container y dentro 16 <div> con clase card para poder darles estilo en css y enumerados del 1 al 16 -->
  <body>
    <header>
      <h1 id="title">💗🍼🍫🍑🍍🔫Emoji Game 💸🥐🥥🍩🧃❤️‍🔥</h1>
    </header>
    <!-- Este <div> se utiliza para agrupar todos los elementos del grupo de cartas y sirve como un contenedor principal. Al encapsular todas las tarjetas dentro de este contenedor, se facilita la aplicación de estilos comunes a todas las tarjetas.
Usando <div> para cada carta, podemos aplicar estilo a través de la clase card en CSS. Así podemos aplicar estilo a todas las cartas de manera uniforme.-->

    <div class="container">
      <div class="card no1">?</div>
      <div class="card no2">?</div>
      <div class="card no3">?</div>
      <div class="card no4">?</div>
      <div class="card no5">?</div>
      <div class="card no6">?</div>
      <div class="card no7">?</div>
      <div class="card no8">?</div>
      <div class="card no9">?</div>
      <div class="card no10">?</div>
      <div class="card no11">?</div>
      <div class="card no12">?</div>
      <div class="card no13">?</div>
      <div class="card no14">?</div>
      <div class="card no15">?</div>
      <div class="card no16">?</div>
    </div>
  </body>
  
  <footer id="a">This game was created by A Team</footer>
</html>
